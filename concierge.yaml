juju:
  model-defaults:
    logging-config: <root>=INFO; unit=DEBUG
providers:
  k8s:
    enable: true
    bootstrap: true
    features:
      local-storage:
      network:
      load-balancer:
        enabled: true
        l2-mode: true
        cidrs: 10.20.30.40/32
    bootstrap-constraints:
      root-disk: 5G
host:
  snaps:
    jhack:
      channel: latest/edge
      connections:
        - jhack:dot-local-share-juju snapd
