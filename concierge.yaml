juju:
  model-defaults:
    logging-config: <root>=INFO; unit=DEBUG
providers:
  k8s:
    channel: 1.35-classic/stable
    enable: true
    bootstrap: true
    features:
      local-storage: {}
      network: {}
      dns: {}
host:
  snaps:
    jhack:
      channel: latest/edge
      connections:
        - jhack:dot-local-share-juju snapd
