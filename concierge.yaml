juju:
  model-defaults:
    logging-config: <root>=INFO; unit=DEBUG
providers:
  k8s:
    enable: true
    bootstrap: true
    features:
      dns:
        upstream-nameservers: 8.8.8.8
      local-storage:
      load-balancer:
host:
  snaps:
    jhack:
      channel: latest/edge
      connections:
        - jhack:dot-local-share-juju snapd
